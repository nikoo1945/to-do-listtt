<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus — To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090F;
      --surface: #111118;
      --surface2: #17171F;
      --surface3: #1E1E2A;
      --accent: #6C63FF;
      --accent-dim: rgba(108,99,255,0.15);
      --text: #EEEEFF;
      --text-sec: #8888AA;
      --text-muted: #44445A;
      --border: rgba(255,255,255,0.06);
      --red: #FF5A6E;
      --red-dim: rgba(255,90,110,0.12);
      --amber: #FFB547;
      --amber-dim: rgba(255,181,71,0.12);
      --green: #3DD68C;
      --green-dim: rgba(61,214,140,0.12);
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app-shell {
      max-width: 680px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    /* ── Progress bar ── */
    .progress-track {
      height: 2px;
      background: var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6C63FF, #A78BFA);
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      border-radius: 0 2px 2px 0;
    }

    /* ── Header ── */
    .app-header { padding: 32px 28px 0; }
    .app-header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .brand-eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      display: block;
      margin-bottom: 4px;
    }
    .brand-title {
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .date-display {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      text-align: right;
      line-height: 1.7;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .stat-cell {
      background: var(--surface);
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .stat-num {
      font-family: 'DM Mono', monospace;
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }
    .stat-num.accent { color: var(--accent); }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Add task ── */
    .add-section { padding: 0 28px; margin-bottom: 6px; }
    .add-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      transition: border-color 0.2s;
    }
    .add-card:focus-within { border-color: rgba(108,99,255,0.4); }
    .add-input-row { display: flex; gap: 10px; margin-bottom: 10px; }

    .task-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 14px;
      height: 42px;
      font-size: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .task-input::placeholder { color: var(--text-muted); }
    .task-input:focus { border-color: rgba(108,99,255,0.5); }

    .btn-primary {
      height: 42px;
      padding: 0 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:active { transform: scale(0.97); }

    .add-meta-row { display: flex; gap: 8px; }
    .meta-select {
      height: 30px;
      padding: 0 28px 0 12px;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 12px;
      color: var(--text-sec);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2344445A' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      transition: border-color 0.15s;
    }
    .meta-select:focus { border-color: rgba(108,99,255,0.4); }
    .meta-select option { background: #1E1E2A; color: #EEEEFF; }

    /* ── Filters ── */
    .filters-section {
      padding: 12px 28px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-pill {
      height: 28px;
      padding: 0 13px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .filter-pill:hover { color: var(--text-sec); border-color: rgba(255,255,255,0.12); }
    .filter-pill.active {
      background: rgba(108,99,255,0.15);
      color: var(--accent);
      border-color: rgba(108,99,255,0.35);
    }
    .filter-spacer { flex: 1; }
    .clear-btn {
      font-size: 12px;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      padding: 4px 0;
      transition: color 0.15s;
      display: none;
    }
    .clear-btn:hover { color: var(--red); }
    .clear-btn.visible { display: block; }

    /* ── Task list ── */
    .tasks-section { padding: 0 28px; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      transition: border-color 0.15s, background 0.15s;
      animation: taskIn 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes taskIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.99); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .task-item:hover { border-color: rgba(255,255,255,0.1); background: var(--surface2); }
    .task-item.done { opacity: 0.42; }

    .check-wrap { flex-shrink: 0; padding-top: 1px; }
    .check-btn {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--text-muted);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .check-btn svg { display: none; }
    .check-btn:hover { border-color: var(--accent); background: rgba(108,99,255,0.15); }
    .check-btn.checked { background: var(--accent); border-color: var(--accent); }
    .check-btn.checked svg { display: block; }

    .task-body { flex: 1; min-width: 0; }
    .task-text { font-size: 14px; color: var(--text); line-height: 1.5; word-break: break-word; }
    .task-text.done { text-decoration: line-through; color: var(--text-muted); }

    .task-footer { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }

    .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 99px;
      letter-spacing: 0.04em;
      font-family: 'DM Mono', monospace;
    }
    .badge.tinggi  { background: var(--red-dim);    color: var(--red); }
    .badge.sedang  { background: var(--amber-dim);  color: var(--amber); }
    .badge.rendah  { background: var(--green-dim);  color: var(--green); }
    .badge.cat     { background: var(--accent-dim); color: var(--accent); }

    .task-date {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    .task-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
    .task-item:hover .task-actions { opacity: 1; }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }
    .icon-btn:hover { background: var(--surface3); color: var(--text); }
    .icon-btn.del:hover { background: var(--red-dim); color: var(--red); }

    .edit-input-field {
      width: 100%;
      background: var(--surface3);
      border: 1px solid rgba(108,99,255,0.4);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      margin-bottom: 4px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      display: none;
    }
    .empty-icon-wrap {
      width: 52px;
      height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      color: var(--text-muted);
    }
    .empty-state p { font-size: 14px; color: var(--text-muted); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }

    @media (max-width: 500px) {
      .app-header, .add-section, .filters-section, .tasks-section { padding-left: 16px; padding-right: 16px; }
      .brand-title { font-size: 22px; }
      .add-input-row { flex-direction: column; }
      .btn-primary { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="app-header">
      <div class="app-header-top">
        <div>
          <span class="brand-eyebrow">Workspace</span>
          <span class="brand-title">Focus</span>
        </div>
        <div class="date-display" id="date-display"></div>
      </div>

      <div class="stats-row">
        <div class="stat-cell">
          <span class="stat-num" id="s-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-cell">
          <span class="stat-num accent" id="s-active">0</span>
          <span class="stat-label">Aktif</span>
        </div>
        <div class="stat-cell">
          <span class="stat-num" id="s-done">0</span>
          <span class="stat-label">Selesai</span>
        </div>
      </div>
    </div>

    <div class="add-section">
      <div class="add-card">
        <div class="add-input-row">
          <input class="task-input" id="task-input" type="text" placeholder="Tugas baru..." maxlength="200" />
          <button class="btn-primary" id="add-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Tambah
          </button>
        </div>
        <div class="add-meta-row">
          <select class="meta-select" id="prio-sel">
            <option value="sedang">Sedang</option>
            <option value="tinggi">Tinggi</option>
            <option value="rendah">Rendah</option>
          </select>
          <select class="meta-select" id="cat-sel">
            <option value="">Kategori</option>
            <option value="kerja">Kerja</option>
            <option value="pribadi">Pribadi</option>
            <option value="belajar">Belajar</option>
            <option value="lainnya">Lainnya</option>
          </select>
        </div>
      </div>
    </div>

    <div class="filters-section">
      <button class="filter-pill active" data-f="semua">Semua</button>
      <button class="filter-pill" data-f="aktif">Aktif</button>
      <button class="filter-pill" data-f="selesai">Selesai</button>
      <button class="filter-pill" data-f="tinggi">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M5 1L6.5 3.5H9L7 5.5L8 8.5L5 7L2 8.5L3 5.5L1 3.5H3.5L5 1Z" fill="currentColor"/>
        </svg>
        Penting
      </button>
      <div class="filter-spacer"></div>
      <button class="clear-btn" id="clear-btn">Hapus selesai</button>
    </div>

    <div class="tasks-section">
      <div id="task-list"></div>
      <div class="empty-state" id="empty-state">
        <div class="empty-icon-wrap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 12l3 3 5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p id="empty-msg">Belum ada tugas. Tambahkan sesuatu.</p>
      </div>
    </div>

  </div>

  <script>
    const KEY = 'focus_todo_v2';
    let tasks = [], filter = 'semua', editId = null;

    function load() {
      try { const s = localStorage.getItem(KEY); if (s) tasks = JSON.parse(s); } catch(e) { tasks = []; }
    }
    function save() { try { localStorage.setItem(KEY, JSON.stringify(tasks)); } catch(e) {} }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }

    function fmt(ts) {
      const d = new Date(ts);
      const M = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
      return d.getDate() + ' ' + M[d.getMonth()];
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function filtered() {
      if (filter === 'aktif')   return tasks.filter(t => !t.done);
      if (filter === 'selesai') return tasks.filter(t =>  t.done);
      if (filter === 'tinggi')  return tasks.filter(t => t.priority === 'tinggi' && !t.done);
      return [...tasks];
    }

    function updateStats() {
      const total = tasks.length;
      const done  = tasks.filter(t => t.done).length;
      const pct   = total ? Math.round((done / total) * 100) : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('s-total').textContent  = total;
      document.getElementById('s-active').textContent = tasks.filter(t => !t.done).length;
      document.getElementById('s-done').textContent   = done;
    }

    function render() {
      const list     = document.getElementById('task-list');
      const empty    = document.getElementById('empty-state');
      const clearBtn = document.getElementById('clear-btn');
      const vis      = filtered();

      updateStats();

      const hasDone = tasks.some(t => t.done);
      clearBtn.classList.toggle('visible', hasDone);

      if (!vis.length) {
        list.innerHTML = '';
        empty.style.display = 'block';
        const msgs = {
          semua:   'Belum ada tugas. Tambahkan sesuatu.',
          aktif:   'Semua tugas sudah selesai!',
          selesai: 'Belum ada tugas yang selesai.',
          tinggi:  'Tidak ada tugas prioritas tinggi.'
        };
        document.getElementById('empty-msg').textContent = msgs[filter] || '';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = '';

      vis.forEach(task => {
        const el = document.createElement('div');
        el.className = 'task-item' + (task.done ? ' done' : '');
        el.dataset.id = task.id;

        const isEdit  = editId === task.id;
        const pLabel  = { tinggi: 'Tinggi', sedang: 'Sedang', rendah: 'Rendah' }[task.priority] || '';

        el.innerHTML = `
          <div class="check-wrap">
            <button class="check-btn${task.done ? ' checked' : ''}" data-check="${task.id}" aria-label="${task.done ? 'Batal selesai' : 'Tandai selesai'}">
              <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                <path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="task-body">
            ${isEdit
              ? `<input class="edit-input-field" id="ei-${task.id}" value="${esc(task.text)}" maxlength="200" />`
              : `<div class="task-text${task.done ? ' done' : ''}">${esc(task.text)}</div>`
            }
            <div class="task-footer">
              <span class="badge ${task.priority}">${pLabel}</span>
              ${task.cat ? `<span class="badge cat">${esc(task.cat)}</span>` : ''}
              <span class="task-date">${fmt(task.ts)}</span>
            </div>
          </div>
          <div class="task-actions">
            ${isEdit
              ? `<button class="icon-btn" data-save="${task.id}" aria-label="Simpan" title="Simpan">
                   <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                 </button>
                 <button class="icon-btn del" data-cancel="${task.id}" aria-label="Batal" title="Batal">
                   <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                 </button>`
              : `<button class="icon-btn" data-edit="${task.id}" aria-label="Edit" title="Edit">
                   <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M9.5 1.5a1.5 1.5 0 012.121 2.121L4.5 10.742 1.5 11.5l.758-3L9.5 1.5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                 </button>
                 <button class="icon-btn del" data-del="${task.id}" aria-label="Hapus" title="Hapus">
                   <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 3.5h9M4.5 3.5V2.5a1 1 0 011-1h1a1 1 0 011 1v1M5.5 6v4M7.5 6v4M3 3.5l.7 7a1 1 0 001 .9h3.6a1 1 0 001-.9l.7-7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                 </button>`
            }
          </div>
        `;
        list.appendChild(el);

        if (isEdit) {
          const inp = document.getElementById('ei-' + task.id);
          if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
        }
      });
    }

    function addTask() {
      const inp = document.getElementById('task-input');
      const txt = inp.value.trim();
      if (!txt) { inp.focus(); return; }
      tasks.unshift({
        id:       uid(),
        text:     txt,
        done:     false,
        priority: document.getElementById('prio-sel').value,
        cat:      document.getElementById('cat-sel').value,
        ts:       Date.now()
      });
      save();
      inp.value = '';
      inp.focus();
      render();
    }

    document.getElementById('add-btn').addEventListener('click', addTask);
    document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    document.getElementById('task-list').addEventListener('click', e => {
      const chk = e.target.closest('[data-check]');
      if (chk) { const t = tasks.find(x => x.id === chk.dataset.check); if (t) { t.done = !t.done; save(); render(); } return; }
      const ed = e.target.closest('[data-edit]');
      if (ed) { editId = ed.dataset.edit; render(); return; }
      const sv = e.target.closest('[data-save]');
      if (sv) {
        const inp = document.getElementById('ei-' + sv.dataset.save);
        if (inp) { const v = inp.value.trim(); if (v) { const t = tasks.find(x => x.id === sv.dataset.save); if (t) t.text = v; save(); } }
        editId = null; render(); return;
      }
      const cn = e.target.closest('[data-cancel]');
      if (cn) { editId = null; render(); return; }
      const dl = e.target.closest('[data-del]');
      if (dl) { tasks = tasks.filter(x => x.id !== dl.dataset.del); save(); render(); }
    });

    document.querySelectorAll('.filter-pill').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        filter = b.dataset.f;
        render();
      });
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    });

    // Date display
    const DAYS   = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const MONTHS = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const now    = new Date();
    document.getElementById('date-display').innerHTML =
      `${DAYS[now.getDay()]}<br>${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

    load();
    render();
  </script>
</body>
</html>
